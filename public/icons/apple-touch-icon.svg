<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#070711"/>
    </radialGradient>
    <radialGradient id="eggGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Solid background — Apple requires no transparency -->
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Outer glow -->
  <ellipse cx="90" cy="88" rx="60" ry="68" fill="url(#glowGrad)"/>
  <!-- Egg shape -->
  <ellipse cx="90" cy="85" rx="36" ry="48" fill="url(#eggGrad)" filter="url(#glow)"/>
  <!-- Egg highlight -->
  <ellipse cx="84" cy="68" rx="13" ry="19" fill="white" opacity="0.12"/>
  <!-- Crack lines -->
  <path d="M82 64 L88 73 L84 78 L90 86" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M95 62 L98 70 L94 74" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Sparkles -->
  <circle cx="72" cy="54" r="1.5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="110" cy="58" r="1.2" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="68" cy="105" r="1" fill="#fbbf24" opacity="0.6"/>
  <circle cx="112" cy="108" r="1.2" fill="#c4b5fd" opacity="0.5"/>
</svg>
