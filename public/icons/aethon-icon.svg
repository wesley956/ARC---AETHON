<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a1030"/>
      <stop offset="100%" stop-color="#070711"/>
    </radialGradient>
    <radialGradient id="eggGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="40%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Outer glow -->
  <ellipse cx="256" cy="260" rx="160" ry="180" fill="url(#glowGrad)"/>
  <!-- Egg shape -->
  <ellipse cx="256" cy="255" rx="95" ry="125" fill="url(#eggGrad)" filter="url(#glow)"/>
  <!-- Egg highlight -->
  <ellipse cx="240" cy="210" rx="35" ry="50" fill="white" opacity="0.12"/>
  <!-- Crack lines -->
  <path d="M230 195 L245 215 L235 230 L250 250" stroke="#fbbf24" stroke-width="2.5" fill="none" opacity="0.7" stroke-linecap="round"/>
  <path d="M260 190 L270 210 L258 225" stroke="#fbbf24" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Sparkles -->
  <circle cx="200" cy="160" r="3" fill="#fbbf24" opacity="0.8"/>
  <circle cx="310" cy="175" r="2.5" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="185" cy="300" r="2" fill="#fbbf24" opacity="0.6"/>
  <circle cx="320" cy="310" r="2.5" fill="#c4b5fd" opacity="0.5"/>
  <circle cx="175" cy="230" r="1.8" fill="#a78bfa" opacity="0.7"/>
  <circle cx="335" cy="240" r="1.5" fill="#a78bfa" opacity="0.6"/>
  <!-- Title -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" fill="#c4b5fd" letter-spacing="3">AETHON</text>
</svg>
